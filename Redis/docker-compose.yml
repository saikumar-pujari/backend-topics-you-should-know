services:
  redis-master:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - redis-net

  redis-slave:
    image: redis:7
    depends_on:
      redis-master:
        condition: service_healthy
    command: redis-server --replicaof redis-master 6379
    ports:
      - "6380:6379"
    networks:
      - redis-net

  redis-sentinel:
    image: redis:7
    volumes:
      - ./sentinel.conf:/etc/sentinel/sentinel.conf:ro
      - redis-sentinel-data:/data
    command:
      - sh
      - -c
      - |
        if [ ! -f /data/sentinel.conf ]; then cp /etc/sentinel/sentinel.conf /data/sentinel.conf; fi
        redis-server /data/sentinel.conf --sentinel
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave:
        condition: service_started
    restart: always
    networks:
      - redis-net

networks:
  redis-net:
    driver: bridge

volumes:
  redis-sentinel-data: